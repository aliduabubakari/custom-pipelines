apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: predictive_maintenance-
  labels:
    pipeline: predictive_maintenance
    domain: Manufacturing / Industry 4.0
    type: ml-pipeline
spec:
  entrypoint: pipeline
  podGC:
    strategy: OnWorkflowCompletion
  templates:
  - name: pipeline
    steps:
    - - name: step-01-data-loading-profiling
        template: step-01-data-loading-profiling
    - - name: step-02-data-cleaning-standardization
        template: step-02-data-cleaning-standardization
    - - name: step-03-feature-engineering--time-domain
        template: step-03-feature-engineering--time-domain
    - - name: step-04-feature-engineering--frequency-domain
        template: step-04-feature-engineering--frequency-domain
    - - name: step-05-exploratory-data-analysis
        template: step-05-exploratory-data-analysis
    - - name: step-06-data-visualization--sensor-health
        template: step-06-data-visualization--sensor-health
    - - name: step-07-data-visualization--failure-patterns
        template: step-07-data-visualization--failure-patterns
    - - name: step-08-statistical-analysis
        template: step-08-statistical-analysis
    - - name: step-09-data-preparation-for-modeling
        template: step-09-data-preparation-for-modeling
    - - name: step-10-model-training--classical-ml
        template: step-10-model-training--classical-ml
    - - name: step-11-model-training--deep-learning
        template: step-11-model-training--deep-learning
    - - name: step-12-remaining-useful-life--rul--prediction
        template: step-12-remaining-useful-life--rul--prediction
    - - name: step-13-model-evaluation-alert-system
        template: step-13-model-evaluation-alert-system
    - - name: step-14-cost-benefit-analysis
        template: step-14-cost-benefit-analysis
    - - name: step-15-final-synthesis-maintenance-playbook
        template: step-15-final-synthesis-maintenance-playbook

  - name: step-01-data-loading-profiling
    container:
      image: python:3.10-slim
      command: [python]
      args: ["/scripts/step_01_data-loading-profiling.py", --data_dir /data, --output_dir /mnt/output]
      volumeMounts:
      - name: scripts
        mountPath: /scripts
      - name: input-data
        mountPath: /data
      - name: pipeline-output
        mountPath: /mnt/output
      resources:
        requests:
          memory: "1Gi"
          cpu: "1000m"
        limits:
          memory: "2Gi"
          cpu: "2000m"

  - name: step-02-data-cleaning-standardization
