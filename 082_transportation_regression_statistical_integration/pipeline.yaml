apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: case-14-17178-
  labels:
    pipeline: data-cleaning-validation
    difficulty: "N/A"
    abilities: ""
spec:
  entrypoint: pipeline
  templates:
  - name: pipeline
    steps:
    - - name: step-01-data-loading-profiling
        template: step-01-data-loading-profiling
    - - name: step-02-data-merging-integration
        template: step-02-data-merging-integration
    - - name: step-03-statistical-analysis-hypothesis-testing
        template: step-03-statistical-analysis-hypothesis-testing
    - - name: step-04-data-loading-profiling-phase-2
        template: step-04-data-loading-profiling-phase-2
    - - name: step-05-regression-modeling
        template: step-05-regression-modeling
    - - name: step-06-regression-modeling-phase-2
        template: step-06-regression-modeling-phase-2
    - - name: step-07-final-synthesis-reporting
        template: step-07-final-synthesis-reporting
    - - name: step-08-revised-analysis-refinement
        template: step-08-revised-analysis-refinement
    - - name: step-09-data-visualization
        template: step-09-data-visualization

  - name: step-01-data-loading-profiling
    container:
      image: python:3.10-slim
      command: [python]
      args: ["/scripts/step_01_data-loading-profiling.py", --player_allstar_csv /data/player_allstar.csv --awards_players_csv /data/awards_players.csv]
      volumeMounts:
      - name: scripts
        mountPath: /scripts
      - name: input-data
        mountPath: /data
      - name: pipeline-output
        mountPath: /mnt/output
      resources:
        requests:
          memory: "512Mi"
          cpu: "500m"
        limits:
          memory: "1Gi"
          cpu: "1000m"

  - name: step-02-data-merging-integration
    container:
      image: python:3.10-slim
      command: [python]
      args: ["/scripts/step_02_data-merging-integration.py", --player_allstar_csv /data/player_allstar.csv --awards_players_csv /data/awards_players.csv --player_awards_ppg_csv /mnt/output/player_awards_ppg.csv]
      volumeMounts:
      - name: scripts
        mountPath: /scripts
      - name: input-data
        mountPath: /data
      - name: pipeline-output
        mountPath: /mnt/output
      resources:
        requests:
          memory: "512Mi"
          cpu: "500m"
        limits:
          memory: "1Gi"
          cpu: "1000m"

  - name: step-03-statistical-analysis-hypothesis-testing
    container:
      image: python:3.10-slim
      command: [python]
      args: ["/scripts/step_03_statistical-analysis-hypothesis-testing.py", --player_awards_ppg_csv /mnt/output/player_awards_ppg.csv --player_awards_ppg_cleaned_csv /mnt/output/player_awards_ppg_cleaned.csv]
      volumeMounts:
      - name: scripts
        mountPath: /scripts
      - name: input-data
        mountPath: /data
      - name: pipeline-output
        mountPath: /mnt/output
      resources:
        requests:
          memory: "512Mi"
          cpu: "500m"
        limits:
          memory: "1Gi"
          cpu: "1000m"

  - name: step-04-data-loading-profiling-phase-2
    container:
      image: python:3.10-slim
      command: [python]
      args: ["/scripts/step_04_data-loading-profiling-phase-2.py", --player_allstar_csv /data/player_allstar.csv --awards_players_csv /data/awards_players.csv --player_awards_ppg_cleaned_csv /mnt/output/player_awards_ppg_cleaned.csv --player_awards_ppg_enhanced_csv /mnt/output/player_awards_ppg_enhanced.csv]
      volumeMounts:
      - name: scripts
        mountPath: /scripts
      - name: input-data
        mountPath: /data
      - name: pipeline-output
        mountPath: /mnt/output
      resources:
        requests:
          memory: "512Mi"
          cpu: "500m"
        limits:
          memory: "1Gi"
          cpu: "1000m"

  - name: step-05-regression-modeling
    container:
      image: python:3.10-slim
      command: [python]
      args: ["/scripts/step_05_regression-modeling.py", --player_awards_ppg_enhanced_csv /mnt/output/player_awards_ppg_enhanced.csv --nba_player_analysis_final_csv /mnt/output/nba_player_analysis_final.csv]
      volumeMounts:
      - name: scripts
        mountPath: /scripts
      - name: input-data
        mountPath: /data
      - name: pipeline-output
        mountPath: /mnt/output
      resources:
        requests:
          memory: "512Mi"
          cpu: "500m"
        limits:
          memory: "1Gi"
          cpu: "1000m"

  - name: step-06-regression-modeling-phase-2
    container:
      image: python:3.10-slim
      command: [python]
      args: ["/scripts/step_06_regression-modeling-phase-2.py", --nba_player_analysis_final_csv /mnt/output/nba_player_analysis_final.csv --nba_career_analysis_final_csv /mnt/output/nba_career_analysis_final.csv]
      volumeMounts:
      - name: scripts
        mountPath: /scripts
      - name: input-data
        mountPath: /data
      - name: pipeline-output
        mountPath: /mnt/output
      resources:
        requests:
          memory: "512Mi"
          cpu: "500m"
        limits:
          memory: "1Gi"
          cpu: "1000m"

  - name: step-07-final-synthesis-reporting
    container:
      image: python:3.10-slim
      command: [python]
      args: ["/scripts/step_07_final-synthesis-reporting.py", --nba_analysis_summary_txt /mnt/output/nba_analysis_summary.txt --nba_career_analysis_final_csv /mnt/output/nba_career_analysis_final.csv --nba_analysis_summary_txt /mnt/output/nba_analysis_summary.txt]
      volumeMounts:
      - name: scripts
        mountPath: /scripts
      - name: input-data
        mountPath: /data
      - name: pipeline-output
        mountPath: /mnt/output
      resources:
        requests:
          memory: "512Mi"
          cpu: "500m"
        limits:
          memory: "1Gi"
          cpu: "1000m"

  - name: step-08-revised-analysis-refinement
    container:
      image: python:3.10-slim
      command: [python]
      args: ["/scripts/step_08_revised-analysis-refinement.py", --nba_career_analysis_final_csv /mnt/output/nba_career_analysis_final.csv]
      volumeMounts:
      - name: scripts
        mountPath: /scripts
      - name: input-data
        mountPath: /data
      - name: pipeline-output
        mountPath: /mnt/output
      resources:
        requests:
          memory: "512Mi"
          cpu: "500m"
        limits:
          memory: "1Gi"
          cpu: "1000m"

  - name: step-09-data-visualization
    container:
      image: python:3.10-slim
      command: [python]
      args: ["/scripts/step_09_data-visualization.py", --nba_career_analysis_final_csv /mnt/output/nba_career_analysis_final.csv]
      volumeMounts:
      - name: scripts
        mountPath: /scripts
      - name: input-data
        mountPath: /data
      - name: pipeline-output
        mountPath: /mnt/output
      resources:
        requests:
          memory: "512Mi"
          cpu: "500m"
        limits:
          memory: "1Gi"
          cpu: "1000m"

  # ── Volume definitions ──
  volumes:
  - name: scripts
    configMap:
      name: pipeline-scripts
  - name: input-data
    configMap:
      name: pipeline-input-data
  - name: pipeline-output
    emptyDir: {}
