apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: energy_forecasting-
  labels:
    pipeline: energy_forecasting
    domain: Energy / Utilities
    type: ml-pipeline
spec:
  entrypoint: pipeline
  podGC:
    strategy: OnWorkflowCompletion
  templates:
  - name: pipeline
    steps:
    - - name: step-01-data-loading-profiling
        template: step-01-data-loading-profiling
    - - name: step-02-data-cleaning-standardization
        template: step-02-data-cleaning-standardization
    - - name: step-03-feature-engineering--calendar
        template: step-03-feature-engineering--calendar
    - - name: step-04-feature-engineering--weather-lag
        template: step-04-feature-engineering--weather-lag
    - - name: step-05-exploratory-data-analysis
        template: step-05-exploratory-data-analysis
    - - name: step-06-data-visualization--consumption-patterns
        template: step-06-data-visualization--consumption-patterns
    - - name: step-07-data-visualization--weather-impact
        template: step-07-data-visualization--weather-impact
    - - name: step-08-time-series-decomposition
        template: step-08-time-series-decomposition
    - - name: step-09-statistical-analysis
        template: step-09-statistical-analysis
    - - name: step-10-model-training--statistical-baselines
        template: step-10-model-training--statistical-baselines
    - - name: step-11-model-training--machine-learning
        template: step-11-model-training--machine-learning
    - - name: step-12-model-training--deep-learning
        template: step-12-model-training--deep-learning
    - - name: step-13-model-evaluation-ensemble
        template: step-13-model-evaluation-ensemble
    - - name: step-14-peak-demand-prediction
        template: step-14-peak-demand-prediction
    - - name: step-15-final-synthesis-operations-plan
        template: step-15-final-synthesis-operations-plan

  - name: step-01-data-loading-profiling
    container:
      image: python:3.10-slim
      command: [python]
      args: ["/scripts/step_01_data-loading-profiling.py", --data_dir /data, --output_dir /mnt/output]
      volumeMounts:
      - name: scripts
        mountPath: /scripts
      - name: input-data
        mountPath: /data
      - name: pipeline-output
        mountPath: /mnt/output
      resources:
        requests:
          memory: "1Gi"
          cpu: "1000m"
        limits:
          memory: "2Gi"
          cpu: "2000m"

  - name: step-02-data-cleaning-standardization
