        mountPath: /mnt/output
      resources:
        requests:
          memory: "512Mi"
          cpu: "500m"
        limits:
          memory: "1Gi"
          cpu: "1000m"

  - name: step-08-data-merging-integration
    container:
      image: python:3.10-slim
      command: [python]
      args: ["/scripts/step_08_data-merging-integration.py", --movies2actors_xlsx /data/movies2actors.xlsx]
      volumeMounts:
      - name: scripts
        mountPath: /scripts
      - name: input-data
        mountPath: /data
      - name: pipeline-output
        mountPath: /mnt/output
      resources:
        requests:
          memory: "512Mi"
          cpu: "500m"
        limits:
          memory: "1Gi"
          cpu: "1000m"

  - name: step-09-data-validation-quality-report
    container:
      image: python:3.10-slim
      command: [python]
      args: ["/scripts/step_09_data-validation-quality-report.py", --movies2directors_xlsx /data/movies2directors.xlsx]
