apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: case-46-3499-
  labels:
    pipeline: data-cleaning-validation
    difficulty: "N/A"
    abilities: ""
spec:
  entrypoint: pipeline
  templates:
  - name: pipeline
    steps:
    - - name: step-01-data-loading-profiling
        template: step-01-data-loading-profiling
    - - name: step-02-error-recovery-robust-loading
        template: step-02-error-recovery-robust-loading
    - - name: step-03-data-loading-profiling-phase-2
        template: step-03-data-loading-profiling-phase-2
    - - name: step-04-error-recovery-robust-loading-phase-2
        template: step-04-error-recovery-robust-loading-phase-2
    - - name: step-05-error-recovery-robust-loading-phase-3
        template: step-05-error-recovery-robust-loading-phase-3
    - - name: step-06-data-cleaning-standardization
        template: step-06-data-cleaning-standardization
    - - name: step-07-model-training-prediction
        template: step-07-model-training-prediction
    - - name: step-08-data-merging-integration
        template: step-08-data-merging-integration
    - - name: step-09-data-validation-quality-report
        template: step-09-data-validation-quality-report

  - name: step-01-data-loading-profiling
    container:
      image: python:3.10-slim
      command: [python]
      args: ["/scripts/step_01_data-loading-profiling.py", --users_xlsx /data/users.xlsx]
      volumeMounts:
      - name: scripts
        mountPath: /scripts
      - name: input-data
        mountPath: /data
      - name: pipeline-output
        mountPath: /mnt/output
      resources:
        requests:
          memory: "512Mi"
          cpu: "500m"
        limits:
          memory: "1Gi"
          cpu: "1000m"

  - name: step-02-error-recovery-robust-loading
    container:
      image: python:3.10-slim
      command: [python]
      args: ["/scripts/step_02_error-recovery-robust-loading.py", --users_xlsx /data/users.xlsx --directors_xlsx /data/directors.xlsx]
      volumeMounts:
      - name: scripts
        mountPath: /scripts
      - name: input-data
        mountPath: /data
      - name: pipeline-output
        mountPath: /mnt/output
      resources:
        requests:
          memory: "512Mi"
          cpu: "500m"
        limits:
          memory: "1Gi"
          cpu: "1000m"

  - name: step-03-data-loading-profiling-phase-2
    container:
      image: python:3.10-slim
      command: [python]
      args: ["/scripts/step_03_data-loading-profiling-phase-2.py", --actors_csv /data/actors.csv]
      volumeMounts:
      - name: scripts
        mountPath: /scripts
      - name: input-data
        mountPath: /data
      - name: pipeline-output
        mountPath: /mnt/output
      resources:
        requests:
          memory: "512Mi"
          cpu: "500m"
        limits:
          memory: "1Gi"
          cpu: "1000m"

  - name: step-04-error-recovery-robust-loading-phase-2
    container:
      image: python:3.10-slim
      command: [python]
      args: ["/scripts/step_04_error-recovery-robust-loading-phase-2.py", --actors_csv /data/actors.csv]
      volumeMounts:
      - name: scripts
        mountPath: /scripts
      - name: input-data
        mountPath: /data
      - name: pipeline-output
        mountPath: /mnt/output
      resources:
        requests:
          memory: "512Mi"
          cpu: "500m"
        limits:
          memory: "1Gi"
          cpu: "1000m"

  - name: step-05-error-recovery-robust-loading-phase-3
    container:
      image: python:3.10-slim
      command: [python]
      args: ["/scripts/step_05_error-recovery-robust-loading-phase-3.py", --actors_csv /data/actors.csv]
      volumeMounts:
      - name: scripts
        mountPath: /scripts
      - name: input-data
        mountPath: /data
      - name: pipeline-output
        mountPath: /mnt/output
      resources:
        requests:
          memory: "512Mi"
          cpu: "500m"
        limits:
          memory: "1Gi"
          cpu: "1000m"

  - name: step-06-data-cleaning-standardization
    container:
      image: python:3.10-slim
      command: [python]
      args: ["/scripts/step_06_data-cleaning-standardization.py", --movies_csv /data/movies.csv]
      volumeMounts:
      - name: scripts
        mountPath: /scripts
      - name: input-data
        mountPath: /data
      - name: pipeline-output
        mountPath: /mnt/output
      resources:
        requests:
          memory: "512Mi"
          cpu: "500m"
        limits:
          memory: "1Gi"
          cpu: "1000m"

  - name: step-07-model-training-prediction
