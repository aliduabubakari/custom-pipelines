apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: credit_risk-
  labels:
    pipeline: credit_risk
    domain: Finance
    type: ml-pipeline
    steps: "16"
spec:
  entrypoint: pipeline
  podGC:
    strategy: OnWorkflowCompletion

  templates:
  - name: pipeline
    steps:
    - - name: step-01
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_01_data-loading-profiling.py
    - - name: step-02
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_02_data-merging-integration.py
    - - name: step-03
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_03_data-cleaning-standardization.py
    - - name: step-04
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_04_data-validation-compliance-check.py
    - - name: step-05
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_05_feature-engineering.py
    - - name: step-06
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_06_exploratory-data-analysis.py
    - - name: step-07
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_07_data-visualization--risk-profiles.py
    - - name: step-08
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_08_data-visualization--credit-behavior.py
    - - name: step-09
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_09_statistical-analysis-hypothesis-testing.py
    - - name: step-10
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_10_data-preparation-for-modeling.py
    - - name: step-11
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_11_model-training--baseline-models.py
    - - name: step-12
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_12_model-training--advanced-ensemble.py
    - - name: step-13
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_13_model-evaluation-threshold-optimization.py
    - - name: step-14
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_14_model-explainability--shap-lime.py
    - - name: step-15
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_15_fairness-regulatory-assessment.py
    - - name: step-16
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_16_final-synthesis-business-recommendations.py

  - name: run-step
    inputs:
      parameters:
      - name: script
    container:
      image: custom-pipelines/credit_risk:latest
      imagePullPolicy: IfNotPresent
      command: [python]
      args: ["/pipeline/scripts/{{inputs.parameters.script}}", "--data_dir", "/pipeline/data", "--output_dir", "/pipeline/output"]
      volumeMounts:
      - name: pipeline-output
        mountPath: /pipeline/output
      resources:
        requests:
          memory: "512Mi"
          cpu: "500m"
        limits:
          memory: "2Gi"
          cpu: "2000m"

  volumes:
  - name: pipeline-output
    emptyDir: {}
