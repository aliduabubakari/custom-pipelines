apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: case-8445-20662-
  labels:
    pipeline: data-cleaning-validation
    difficulty: "4"
    abilities: "Data Preparation, Data Analysis, Data Visualization"
spec:
  entrypoint: pipeline
  templates:
  - name: pipeline
    steps:
    - - name: step-01-data-loading-profiling
        template: step-01-data-loading-profiling
    - - name: step-02-file-format
        template: step-02-file-format
    - - name: step-03-data-structure
        template: step-03-data-structure
    - - name: step-04-data-visualization-error-cause
        template: step-04-data-visualization-error-cause
    - - name: step-05-data-cleaning-standardization-scope-issue
