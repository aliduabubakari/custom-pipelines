    - - name: step-14-data-visualization-success-confirmation-phase-2
        template: step-14-data-visualization-success-confirmation-phase-2

  - name: step-01-data-loading-profiling
    container:
      image: python:3.10-slim
      command: [python]
      args: ["/scripts/step_01_data-loading-profiling.py", ]
      volumeMounts:
      - name: scripts
        mountPath: /scripts
      - name: input-data
        mountPath: /data
      - name: pipeline-output
        mountPath: /mnt/output
      resources:
        requests:
          memory: "512Mi"
          cpu: "500m"
        limits:
          memory: "1Gi"
          cpu: "1000m"

  - name: step-02-file-format
    container:
      image: python:3.10-slim
      command: [python]
      args: ["/scripts/step_02_file-format.py", --AREA_CODE_STATE_xlsx /data/AREA_CODE_STATE.xlsx --excel_data_temp_csv /mnt/output/excel_data_temp.csv --json_data_temp_csv /mnt/output/json_data_temp.csv]
      volumeMounts:
      - name: scripts
        mountPath: /scripts
      - name: input-data
        mountPath: /data
      - name: pipeline-output
        mountPath: /mnt/output
      resources:
        requests:
          memory: "512Mi"
          cpu: "500m"
        limits:
          memory: "1Gi"
          cpu: "1000m"

  - name: step-03-data-structure
