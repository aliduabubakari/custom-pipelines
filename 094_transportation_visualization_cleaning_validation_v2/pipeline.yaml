      image: python:3.10-slim
      command: [python]
      args: ["/scripts/step_14_data-visualization-success-confirmation-.py", --date /data/date --PROJECT_CLOSED_txt /mnt/output/PROJECT_CLOSED.txt --CHECKSUMS_txt /mnt/output/CHECKSUMS.txt --PROJECT_CLOSED_txt /mnt/output/PROJECT_CLOSED.txt --CHECKSUMS_txt /mnt/output/CHECKSUMS.txt]
      volumeMounts:
      - name: scripts
        mountPath: /scripts
      - name: input-data
