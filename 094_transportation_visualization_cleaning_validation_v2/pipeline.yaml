      image: python:3.10-slim
      command: [python]
      args: ["/scripts/step_03_data-structure.py", --validation_report_txt /mnt/output/validation_report.txt --excel_data_temp_csv /mnt/output/excel_data_temp.csv --json_data_temp_csv /mnt/output/json_data_temp.csv --validation_report_txt /mnt/output/validation_report.txt --state_frequency_csv /mnt/output/state_frequency.csv --cleaned_area_codes_csv /mnt/output/cleaned_area_codes.csv]
