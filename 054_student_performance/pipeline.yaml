apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: student_performance-
  labels:
    pipeline: student_performance
    domain: Education / EdTech
    type: ml-pipeline
spec:
  entrypoint: pipeline
  podGC:
    strategy: OnWorkflowCompletion
  templates:
  - name: pipeline
    steps:
    - - name: step-01-data-loading-profiling
        template: step-01-data-loading-profiling
    - - name: step-02-data-aggregation--assessment-metrics
        template: step-02-data-aggregation--assessment-metrics
    - - name: step-03-data-aggregation--engagement-metrics
