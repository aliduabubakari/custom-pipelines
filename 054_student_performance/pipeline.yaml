    - - name: step-15-model-explainability-fairness
        template: step-15-model-explainability-fairness
    - - name: step-16-final-synthesis-intervention-playbook
        template: step-16-final-synthesis-intervention-playbook

  - name: step-01-data-loading-profiling
    container:
      image: python:3.10-slim
      command: [python]
      args: ["/scripts/step_01_data-loading-profiling.py", --data_dir /data, --output_dir /mnt/output]
      volumeMounts:
      - name: scripts
        mountPath: /scripts
      - name: input-data
        mountPath: /data
      - name: pipeline-output
        mountPath: /mnt/output
      resources:
        requests:
          memory: "1Gi"
          cpu: "1000m"
        limits:
          memory: "2Gi"
          cpu: "2000m"

