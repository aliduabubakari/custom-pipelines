apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: customer-churn
  labels:
    pipeline: customer_churn
    domain: SaaS
    type: ml-pipeline
    steps: "16"
spec:
  entrypoint: pipeline
  serviceAccountName: argo-workflow
  podGC:
    strategy: OnWorkflowCompletion

  volumeClaimTemplates:
  - metadata:
      name: pipeline-output
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: local-path
      resources:
        requests:
          storage: 1Gi

  templates:
  - name: pipeline
    steps:
    - - name: step-01
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_01_data-loading-profiling.py
    - - name: step-02
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_02_data-aggregation--customer-metrics.py
    - - name: step-03
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_03_data-merging-integration.py
    - - name: step-04
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_04_data-cleaning-standardization.py
    - - name: step-05
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_05_feature-engineering.py
    - - name: step-06
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_06_exploratory-data-analysis.py
    - - name: step-07
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_07_data-visualization--churn-patterns.py
    - - name: step-08
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_08_data-visualization--behavioral-analysis.py
    - - name: step-09
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_09_statistical-analysis.py
    - - name: step-10
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_10_cohort-analysis.py
    - - name: step-11
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_11_data-preparation-for-modeling.py
    - - name: step-12
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_12_model-training--multi-model-comparison.py
    - - name: step-13
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_13_model-optimization-ensembling.py
    - - name: step-14
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_14_model-evaluation-business-impact.py
    - - name: step-15
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_15_customer-segmentation-for-retention.py
    - - name: step-16
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_16_final-synthesis-retention-playbook.py

  - name: run-step
    inputs:
      parameters:
      - name: script
    container:
      image: custom-pipelines/customer_churn:latest
      imagePullPolicy: IfNotPresent
      command: [python]
      args: ["/pipeline/scripts/{{inputs.parameters.script}}", "--data_dir", "/pipeline/data", "--output_dir", "/pipeline/output"]
      volumeMounts:
      - name: pipeline-output
        mountPath: /pipeline/output
      resources:
        requests:
          memory: "512Mi"
          cpu: "500m"
        limits:
          memory: "2Gi"
          cpu: "2000m"