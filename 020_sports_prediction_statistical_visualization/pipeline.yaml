apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: sports-prediction-statistical-visualization
  labels:
    pipeline: sports_prediction_statistical_visualization
    domain: Sports
    type: ml-pipeline
    steps: "6"
spec:
  entrypoint: pipeline
  serviceAccountName: argo-workflow
  podGC:
    strategy: OnWorkflowCompletion

  volumeClaimTemplates:
  - metadata:
      name: pipeline-output
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: local-path
      resources:
        requests:
          storage: 1Gi

  templates:
  - name: pipeline
    steps:
    - - name: step-01
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_01_load.py
    - - name: step-02
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_02_clean.py
    - - name: step-03
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_03_features.py
    - - name: step-04
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_04_eda.py
    - - name: step-05
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_05_model.py
    - - name: step-06
        template: run-step
        arguments:
          parameters:
          - name: script
            value: step_06_report.py

  - name: run-step
    inputs:
      parameters:
      - name: script
    container:
      image: custom-pipelines/sports_prediction_statistical_visualization:latest
      imagePullPolicy: IfNotPresent
      command: [python]
      args: ["/pipeline/scripts/{{inputs.parameters.script}}", "--data_dir", "/pipeline/data", "--output_dir", "/pipeline/output"]
      volumeMounts:
      - name: pipeline-output
        mountPath: /pipeline/output
      resources:
        requests:
          memory: "512Mi"
          cpu: "500m"
        limits:
          memory: "2Gi"
          cpu: "2000m"