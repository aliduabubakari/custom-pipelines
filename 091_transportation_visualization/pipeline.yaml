    - - name: step-10-data-merging-integration-phase-2
        template: step-10-data-merging-integration-phase-2

  - name: step-01-data-loading-profiling
    container:
      image: python:3.10-slim
      command: [python]
      args: ["/scripts/step_01_data-loading-profiling.py", --course_csv /data/course.csv --course_analysis_txt /mnt/output/course_analysis.txt --course_analysis_txt /mnt/output/course_analysis.txt]
      volumeMounts:
      - name: scripts
        mountPath: /scripts
      - name: input-data
        mountPath: /data
      - name: pipeline-output
        mountPath: /mnt/output
      resources:
        requests:
          memory: "512Mi"
          cpu: "500m"
        limits:
          memory: "1Gi"
          cpu: "1000m"

  - name: step-02-data-visualization
    container:
      image: python:3.10-slim
      command: [python]
      args: ["/scripts/step_02_data-visualization.py", --course_csv /data/course.csv --course_with_categories_csv /mnt/output/course_with_categories.csv]
      volumeMounts:
      - name: scripts
        mountPath: /scripts
      - name: input-data
        mountPath: /data
      - name: pipeline-output
        mountPath: /mnt/output
