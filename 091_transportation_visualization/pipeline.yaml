apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: case-27-15311-
  labels:
    pipeline: data-cleaning-validation
    difficulty: "N/A"
    abilities: ""
spec:
  entrypoint: pipeline
  templates:
  - name: pipeline
    steps:
    - - name: step-01-data-loading-profiling
        template: step-01-data-loading-profiling
    - - name: step-02-data-visualization
        template: step-02-data-visualization
    - - name: step-03-data-visualization-phase-2
        template: step-03-data-visualization-phase-2
    - - name: step-04-data-loading-profiling-phase-2
