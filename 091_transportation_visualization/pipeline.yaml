      args: ["/scripts/step_10_data-merging-integration-phase-2.py", --enhanced_student_data_csv /mnt/output/enhanced_student_data.csv --enhanced_prof_data_csv /mnt/output/enhanced_prof_data.csv --enhanced_reg_data_csv /mnt/output/enhanced_reg_data.csv --course_with_categories_csv /mnt/output/course_with_categories.csv --RA_csv /data/RA.csv --final_integrated_dataset_csv /mnt/output/final_integrated_dataset.csv]
