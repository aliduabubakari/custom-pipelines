apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: ecommerce_recommendation-
  labels:
    pipeline: ecommerce_recommendation
    domain: Retail / E-Commerce
    type: ml-pipeline
spec:
  entrypoint: pipeline
  podGC:
    strategy: OnWorkflowCompletion
  templates:
  - name: pipeline
    steps:
    - - name: step-01-data-loading-profiling
        template: step-01-data-loading-profiling
    - - name: step-02-data-merging-integration
        template: step-02-data-merging-integration
    - - name: step-03-data-cleaning-standardization
        template: step-03-data-cleaning-standardization
    - - name: step-04-rfm-analysis
        template: step-04-rfm-analysis
    - - name: step-05-feature-engineering
        template: step-05-feature-engineering
    - - name: step-06-exploratory-data-analysis
        template: step-06-exploratory-data-analysis
    - - name: step-07-data-visualization--sales-dashboard
        template: step-07-data-visualization--sales-dashboard
    - - name: step-08-data-visualization--customer-insights
        template: step-08-data-visualization--customer-insights
    - - name: step-09-statistical-analysis
        template: step-09-statistical-analysis
    - - name: step-10-collaborative-filtering-model
        template: step-10-collaborative-filtering-model
    - - name: step-11-content-based-recommendation
        template: step-11-content-based-recommendation
    - - name: step-12-customer-churn-prediction
        template: step-12-customer-churn-prediction
    - - name: step-13-customer-lifetime-value-prediction
        template: step-13-customer-lifetime-value-prediction
    - - name: step-14-model-evaluation-a-b-test-design
        template: step-14-model-evaluation-a-b-test-design
    - - name: step-15-final-synthesis-strategy-playbook
        template: step-15-final-synthesis-strategy-playbook

  - name: step-01-data-loading-profiling
    container:
      image: python:3.10-slim
      command: [python]
      args: ["/scripts/step_01_data-loading-profiling.py", --data_dir /data, --output_dir /mnt/output]
      volumeMounts:
      - name: scripts
        mountPath: /scripts
      - name: input-data
        mountPath: /data
      - name: pipeline-output
        mountPath: /mnt/output
      resources:
        requests:
          memory: "1Gi"
          cpu: "1000m"
        limits:
          memory: "2Gi"
          cpu: "2000m"

  - name: step-02-data-merging-integration
