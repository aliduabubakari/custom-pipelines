apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: insurance_claims-
  labels:
    pipeline: insurance_claims
    domain: Insurance
    type: ml-pipeline
spec:
  entrypoint: pipeline
  podGC:
    strategy: OnWorkflowCompletion
  templates:
  - name: pipeline
    steps:
    - - name: step-01-data-loading-profiling
        template: step-01-data-loading-profiling
    - - name: step-02-data-cleaning-standardization
        template: step-02-data-cleaning-standardization
    - - name: step-03-feature-engineering--claim-characteristics
