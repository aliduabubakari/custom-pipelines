    - - name: step-08-data-preparation-for-modeling
        template: step-08-data-preparation-for-modeling
    - - name: step-09-model-training--fraud-detection
        template: step-09-model-training--fraud-detection
    - - name: step-10-model-optimization-threshold-tuning
        template: step-10-model-optimization-threshold-tuning
    - - name: step-11-anomaly-detection
        template: step-11-anomaly-detection
    - - name: step-12-model-explainability
        template: step-12-model-explainability
    - - name: step-13-claim-severity-prediction
        template: step-13-claim-severity-prediction
    - - name: step-14-fairness-assessment
        template: step-14-fairness-assessment
    - - name: step-15-final-synthesis-fraud-playbook
        template: step-15-final-synthesis-fraud-playbook

  - name: step-01-data-loading-profiling
    container:
      image: python:3.10-slim
      command: [python]
      args: ["/scripts/step_01_data-loading-profiling.py", --data_dir /data, --output_dir /mnt/output]
      volumeMounts:
      - name: scripts
        mountPath: /scripts
      - name: input-data
        mountPath: /data
      - name: pipeline-output
        mountPath: /mnt/output
      resources:
        requests:
          memory: "1Gi"
          cpu: "1000m"
        limits:
          memory: "2Gi"
          cpu: "2000m"

  - name: step-02-data-cleaning-standardization
